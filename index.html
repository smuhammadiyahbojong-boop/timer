<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Online - Durasi 30 Menit</title>
    <style>
        /* Desain Halaman */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; }
        
        /* Header & Timer */
        #header { position: fixed; top: 0; width: 100%; background: #ffffff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        #timer-container { font-size: 28px; color: #d93025; font-weight: bold; }
        .warning { color: #5f6368; font-size: 14px; margin-top: 5px; font-style: italic; }
        
        /* Pengaturan Form */
        iframe { width: 100%; height: 100vh; border: none; margin-top: 100px; }
        
        /* Layar Penutup saat Waktu Habis */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; text-align: center; padding-top: 20%; }
        #overlay h1 { color: #d93025; font-size: 48px; }
        #overlay p { font-size: 18px; color: #555; }
    </style>
</head>
<body>

<div id="header">
    <div id="timer-container">Sisa Waktu: <span id="time">30:00</span></div>
    <div class="warning">Peringatan: Jangan refresh halaman atau waktu akan terulang!</div>
</div>

<div id="overlay">
    <h1>WAKTU HABIS!</h1>
    <p>Maaf, waktu pengerjaan 30 menit Anda telah berakhir.<br>Silakan hubungi pengawas jika ada kendala.</p>
</div>

<iframe id="googleForm" src="https://docs.google.com/forms/d/e/1FAIpQLScEziMdrL9bmYf7A4YyzxbIJx3e5OyYFYFwNTc0ImZ7nzhK5g/viewform?embedded=true">Memuat…</iframe>

<script>
    // Pengaturan Durasi: 30 menit
    var duration = 30 * 60; 
    var display = document.querySelector('#time');
    var overlay = document.querySelector('#overlay');
    var formFrame = document.querySelector('#googleForm');
    
    var countdown = setInterval(function () {
        var minutes = parseInt(duration / 60, 10);
        var seconds = parseInt(duration % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.textContent = minutes + ":" + seconds;

        // Jika waktu habis
        if (--duration < 0) {
            clearInterval(countdown);
            overlay.style.display = 'block'; // Munculkan layar penutup
            formFrame.remove(); // Hapus form agar tidak bisa diisi lagi
        }
    }, 1000);
</script>

</body>
</html>
